<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XOS | Celebrate</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #000000;
            --accent: #007aff;
            --card-bg: #0a0a0a;
            --border: #1a1a1a;
            --text: #f5f5f7;
            --dim: #8a8a9e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto; /* Fully scrollable */
        }

        /* Initial identification screen */
        #page-1 {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 360px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .auth-input {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            padding: 18px;
            color: #fff;
            border-radius: 8px;
            margin: 20px 0;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            text-align: center;
        }

        .auth-input:focus { border-color: var(--accent); }

        .btn-main {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-main:active { transform: scale(0.95); }

        /* Wish Section */
        #page-2 {
            display: none;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 10px;
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .full-photo {
            width: 100%;
            height: auto;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            margin-bottom: 20px;
        }

        .wish-content {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 40px;
        }

        .wish-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 10px;
            line-height: 1;
        }

        .note-box {
            margin-top: 20px;
            padding: 15px;
            border-left: 2px solid var(--accent);
            background: rgba(255,255,255,0.02);
            text-align: left;
        }

        .dev-badge {
            font-size: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--dim);
            margin-top: 15px;
        }

        .footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--dim);
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <div id="page-1">
        <div class="auth-card">
            <h2 style="font-size: 1.2rem; letter-spacing: -0.5px;">XOS IDENTITY</h2>
            <input type="text" id="nameInput" class="auth-input" placeholder="Who are you?" autocomplete="off">
            <button class="btn-main" onclick="reveal()">OPEN PORTAL</button>
            <div class="dev-badge">XOS1 // STABLE BUILD</div>
        </div>
    </div>

    <div id="page-2">
        <div style="padding-top: 20px;">
            <img id="mainPhoto" class="full-photo" src="" alt="Birthday Celebration">
            
            <div class="wish-content">
                <div class="wish-title" id="titleText"></div>
                <div style="font-size: 2.5rem; margin: 15px 0;">🎉</div>
                
                <div class="note-box">
                    <p id="typewriter" style="font-size: 1.1rem; color: var(--text); font-weight: 400;"></p>
                </div>
            </div>

            <div class="footer">
                <p>APRIL 01, 2026</p>
                <p style="margin-top: 10px;">PROUDLY BUILT ON XOS INTERFACE</p>
            </div>
        </div>
    </div>

    <script>
        const audio = new Audio('y2mate_xvijLIk.mp3');

        function reveal() {
            const name = document.getElementById('nameInput').value.trim().toLowerCase();
            const p1 = document.getElementById('page-1');
            const p2 = document.getElementById('page-2');
            const img = document.getElementById('mainPhoto');
            const title = document.getElementById('titleText');

            if (name === "neeraj" || name === "niru") {
                img.src = "niru.png";
                title.innerHTML = "HAPPY BIRTHDAY<br>BRO";
                startProcess(p1, p2, "Happy Birthday Bro. God bless you.");
            } 
            else if (name === "harshita") {
                img.src = "harshita.png";
                title.innerHTML = "HAPPY BIRTHDAY<br>SIS";
                startProcess(p1, p2, "Happy Birthday Sis. God bless you.");
            } 
            else {
                alert("Identity unrecognized.");
            }
        }

        function startProcess(hide, show, msg) {
            hide.style.display = 'none';
            show.style.display = 'block';
            
            // Audio & Visuals
            audio.play().catch(() => {});
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#007aff', '#ffffff']
            });

            // Typewriter logic
            let i = 0;
            const target = document.getElementById('typewriter');
            function type() {
                if (i < msg.length) {
                    target.innerHTML += msg.charAt(i);
                    i++;
                    setTimeout(type, 50);
                }
            }
            type();
        }

        // Enter key support
        document.getElementById('nameInput').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') reveal();
        });
    </script>
</body>
</html>
