<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birthday Portal | XOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #000000;
            --accent: #007aff;
            --accent-glow: rgba(0, 122, 255, 0.2);
            --text-main: #f5f5f7;
            --text-dim: #8a8a9e;
            --card-bg: #0a0a0a;
            --card-border: #1a1a1a;
            --error: #ff4d6d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }

        .header { text-align: center; margin: 40px 0 20px; }
        .header h1 {
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        /* xos1 Card Style */
        .access-card {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 30px 20px;
            backdrop-filter: blur(12px);
            transition: transform 0.1s ease;
        }

        .access-card:active { transform: scale(0.98); }

        .input-group { position: relative; margin: 20px 0; }
        
        .access-input {
            width: 100%;
            background: #000;
            border: 1px solid var(--card-border);
            padding: 16px;
            color: var(--text-main);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            text-align: center;
        }

        .access-input:focus { border-color: var(--accent); }

        .btn-access {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .dev-badge {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-top: 20px;
        }

        /* Page Transitions */
        #page-2 {
            display: none;
            width: 100%;
            transform: translateY(20px);
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        .celebration-card {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 25px 20px;
            text-align: center;
        }

        .hero-title {
            font-weight: 800;
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .message-container {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            text-align: left;
            border-left: 2px solid var(--accent);
        }

        .footer { text-align: center; padding: 20px; color: var(--text-dim); font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="header">
        <h1>XOS CELEBRATE</h1>
    </div>

    <div class="main-container">
        <div id="page-1" style="width: 100%; text-align: center;">
            <div class="access-card">
                <p style="color: var(--text-dim); font-size: 0.9rem;">Who are you?</p>
                <div class="input-group">
                    <input type="text" id="userName" class="access-input" placeholder="Enter name..." autocomplete="off">
                </div>
                <button class="btn-access" onclick="revealWish()">
                    OPEN WISH <i class="fas fa-heart"></i>
                </button>
            </div>
            <div class="dev-badge">v1.0.0 // STABLE</div>
        </div>

        <div id="page-2">
            <div class="celebration-card">
                <img id="wishImg" src="" alt="Birthday" style="width: 100%; border-radius: 12px; border: 1px solid var(--card-border);">
                <div class="hero-title" id="wishTitle"></div>
                <div style="font-size: 2rem;">🎂</div>
                <div class="message-container">
                    <div id="typewriter" style="font-size: 0.95rem; line-height: 1.6; color: var(--text-dim);"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 XOS INT</p>
    </div>

    <script>
        const successAudio = new Audio('y2mate_xvijLIk.mp3');

        function fireConfetti() {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#007aff', '#ffffff'] });
        }

        function revealWish() {
            const name = document.getElementById('userName').value.trim().toLowerCase();
            const p1 = document.getElementById('page-1');
            const p2 = document.getElementById('page-2');
            const img = document.getElementById('wishImg');
            const title = document.getElementById('wishTitle');

            if (name === "neeraj" || name === "niru") {
                img.src = "niru.png";
                title.innerHTML = "HAPPY BIRTHDAY BRO";
                startFlow(p1, p2, "To my day-one protector and partner in chaos. Keep leveling up and breaking boundaries. You're the GOAT, Bro. God bless you.");
            } 
            else if (name === "harshita") {
                img.src = "harshita.png";
                title.innerHTML = "HAPPY BIRTHDAY SIS";
                startFlow(p1, p2, "To an amazing sister. May your year be filled with success and happiness. Keep shining! God bless you, Sis.");
            } 
            else {
                alert("Please enter Neeraj or Harshita");
            }
        }

        function startFlow(hide, show, msg) {
            hide.style.display = 'none';
            show.style.display = 'block';
            successAudio.play().catch(() => {});
            fireConfetti();
            
            let i = 0;
            const target = document.getElementById('typewriter');
            function type() {
                if (i < msg.length) {
                    target.innerHTML += msg.charAt(i);
                    i++;
                    setTimeout(type, 40);
                }
            }
            type();
        }

        document.getElementById('userName').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') revealWish();
        });
    </script>
</body>
</html>
